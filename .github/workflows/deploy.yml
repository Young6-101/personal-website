name: Build and Deploy

on:
  push:
    branches: [ main ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/young6-101/portfolio:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    env:
      VM_HOST: ${{ secrets.VM_HOST }}
      VM_USERNAME: ${{ secrets.VM_USERNAME }}
      AZURE_VM_SSH_KEY: ${{ secrets.AZURE_VM_SSH_KEY }}
    steps:
      - name: Validate deploy secrets
        run: |
          [ -n "$VM_HOST" ] || (echo "Missing secret: VM_HOST" && exit 1)
          [ -n "$VM_USERNAME" ] || (echo "Missing secret: VM_USERNAME" && exit 1)
          [ -n "$AZURE_VM_SSH_KEY" ] || (echo "Missing secret: AZURE_VM_SSH_KEY" && exit 1)

      - name: Deploy to Azure VM via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ env.VM_HOST }}
          port: 22
          username: ${{ env.VM_USERNAME }}
          key: ${{ env.AZURE_VM_SSH_KEY }}
          timeout: 60s
          command_timeout: 20m
          debug: true
          script_stop: true
          script: |
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker stop portfolio || true
            docker rm portfolio || true
            docker pull ghcr.io/young6-101/portfolio:latest
            docker run -d --name portfolio --restart always -p 8081:80 ghcr.io/young6-101/portfolio:latest