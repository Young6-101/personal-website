name: Build and Deploy

on:
  push:
    branches: [ main ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/young6-101/portfolio:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - name: Check deploy secrets availability
        env:
          AZURE_VM_HOST: ${{ secrets.AZURE_VM_HOST }}
          AZURE_VM_USERNAME: ${{ secrets.AZURE_VM_USERNAME }}
          AZURE_VM_SSH_KEY: ${{ secrets.AZURE_VM_SSH_KEY }}
        run: |
          [ -n "$AZURE_VM_HOST" ] || (echo "Secret AZURE_VM_HOST is empty or unavailable" && exit 1)
          [ -n "$AZURE_VM_USERNAME" ] || (echo "Secret AZURE_VM_USERNAME is empty or unavailable" && exit 1)
          [ -n "$AZURE_VM_SSH_KEY" ] || (echo "Secret AZURE_VM_SSH_KEY is empty or unavailable" && exit 1)

      - name: Deploy to Azure VM via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.AZURE_VM_HOST }}
          port: 22
          username: ${{ secrets.AZURE_VM_USERNAME }}
          key: ${{ secrets.AZURE_VM_SSH_KEY }}
          script: |
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker stop portfolio || true
            docker rm portfolio || true
            docker pull ghcr.io/young6-101/portfolio:latest
            docker run -d --name portfolio --restart always -p 8081:80 ghcr.io/young6-101/portfolio:latest